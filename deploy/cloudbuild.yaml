# Build les deux images (API + dashboard) depuis la racine du dépôt
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/docker/api/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/predictions-api:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/docker/dashboard/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/streamlit-dashboard:${_TAG}
      - .

images:
  - gcr.io/$PROJECT_ID/predictions-api:${_TAG}
  - gcr.io/$PROJECT_ID/streamlit-dashboard:${_TAG}

substitutions:
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
